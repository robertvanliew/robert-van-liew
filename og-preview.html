<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1200">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=Quicksand:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      background: #f3f5f2;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      padding: 80px 100px;
      overflow: hidden;
    }

    .name {
      font-family: 'Fraunces', serif;
      font-size: 96px;
      font-weight: 600;
      line-height: 1;
      color: #202522;
      letter-spacing: -0.01em;
      white-space: nowrap;
    }

    .name em {
      font-style: italic;
      color: #0077c5;
    }

    .url {
      margin-top: 20px;
      font-family: 'Quicksand', sans-serif;
      font-size: 20px;
      font-weight: 500;
      color: #5f6561;
      letter-spacing: 0.02em;
    }

    .title {
      margin-top: 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 400;
      color: #9ba1a0;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .rule {
      width: 48px;
      height: 1px;
      background: #c0c4c1;
      margin: 24px 0;
    }
  </style>
</head>
<body>
  <div class="name">Robert Van <em>Liew</em></div>
  <div class="title">Product Designer &amp; Full-Stack Developer</div>
  <div class="rule"></div>
  <div class="url">robertvanliew.com</div>
</body>
</html>
